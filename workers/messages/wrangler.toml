name = "mailarchive-message-worker"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# R2 bucket bindings
[[r2_buckets]]
binding = "MESSAGES"
bucket_name = "ml-messages-json"
preview_bucket_name = "ml-messages-json"

[[r2_buckets]]
binding = "TEMPLATES"
bucket_name = "ml-templates"
preview_bucket_name = "ml-templates"

# Environment variables
[vars]
ORIGIN_URL = "https://mailarchive.ietf.org"
TEMPLATE_NAME = "message-detail.html"
TEMPLATE_CACHE_TTL = "3600"

# Routes - configure for production
# routes = [
#   { pattern = "mailarchive.ietf.org/arch/msg/*", zone_name = "ietf.org" }
# ]
